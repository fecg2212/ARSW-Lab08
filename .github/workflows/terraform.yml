name: Terraform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate (sin backend)
        run: terraform init -backend=false && terraform validate

      - name: Azure Login (OIDC)
        if: env.ARM_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        if: env.ARM_CLIENT_ID != ''
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        if: env.ARM_CLIENT_ID != ''
        run: terraform plan -var-file=env/dev.tfvars -out=plan.tfplan

      - name: Upload Plan
        if: env.ARM_CLIENT_ID != ''
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/plan.tfplan

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' && env.ARM_CLIENT_ID != ''
        run: terraform apply -auto-approve "plan.tfplan"

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' && env.ARM_CLIENT_ID != ''
        run: terraform destroy -auto-approve -var-file=env/dev.tfvars
